<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - EatsMenu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { --primary: #00e676; --bg: #050505; --surface: #121212; --border: #333; --text: #fff; }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); }
        
        .dash-header { background: var(--surface); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .dash-container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
        
        .btn-download { background: #222; border: 1px solid var(--primary); color: var(--primary); padding: 8px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .btn-download:hover { background: var(--primary); color: #000; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #aaa; font-size: 0.9rem; }
        input, textarea { width: 100%; background: #080808; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; }

        .hospedagem-box { background: rgba(0, 230, 118, 0.05); border: 1px dashed var(--primary); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .hospedagem-box a { color: var(--primary); font-weight: 800; text-decoration: underline; }

        .btn { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 10px; background: #222; border: 1px solid #333; color: #fff; border-radius: 10px; cursor: pointer; }
        .tabs button.active { background: var(--primary); color: #000; border-color: var(--primary); }
    </style>
</head>
<body>

    <div class="dash-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <h3 style="color:var(--primary)">EatsMenu Admin</h3>
            <a href="https://www.mediafire.com/file/5k49afxecp3kf7m/EatsMenu+Bot+Setup+1.0.0.exe/file" target="_blank" class="btn-download">
                <i class="fas fa-download"></i> Baixar Robô
            </a>
        </div>
        <button onclick="logout()" style="background:#ff1744; border:none; color:#fff; padding:5px 15px; border-radius:5px; cursor:pointer;">Sair</button>
    </div>

    <div class="dash-container">
        <div class="tabs">
            <button onclick="setTab('loja')" id="t-loja" class="active">Loja</button>
            <button onclick="setTab('produtos')" id="t-produtos">Cardápio</button>
        </div>

        <div id="view-loja">
            <div class="input-group"><label>Nome da Loja</label><input type="text" id="conf-nome"></div>
            <div class="input-group"><label>WhatsApp de Contato</label><input type="text" id="conf-zap" placeholder="Ex: 5527995809348"></div>
            <button class="btn" onclick="salvarLoja()">SALVAR DADOS</button>
        </div>

        <div id="view-produtos" style="display:none;">
            <div class="hospedagem-box">
                <p>💡 <b>Dica:</b> Para as fotos do cardápio, faça o upload em <a href="https://imgbb.com/" target="_blank">ImgBB.com</a> e cole o <b>Link direto da imagem</b> abaixo.</p>
            </div>

            <div style="background:var(--surface); padding:20px; border-radius:15px; border:1px solid #333;">
                <div class="input-group"><label>Nome do Produto</label><input type="text" id="p-nome"></div>
                <div class="input-group"><label>Preço</label><input type="number" id="p-preco"></div>
                <div class="input-group"><label>URL da Imagem (Hospedada no ImgBB)</label><input type="text" id="p-img" placeholder="https://i.ibb.co/..."></div>
                <button class="btn" onclick="addProduto()">ADICIONAR AO CARDÁPIO</button>
            </div>
            <div id="lista-produtos" style="margin-top:20px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIvmoayNis2C2xLFQtpRzzrc4dWxGvotU",
            authDomain: "eatsmenu-62cfa.firebaseapp.com",
            projectId: "eatsmenu-62cfa",
            storageBucket: "eatsmenu-62cfa.firebasestorage.app",
            messagingSenderId: "896131512194",
            appId: "1:896131512194:web:51891cf2bd5a04c6c7819b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let userUid = null;
        let data = { produtos: [] };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userUid = user.uid;
                const snap = await getDoc(doc(db, "lojas", userUid));
                data = snap.data();
                document.getElementById('conf-nome').value = data.nome;
                renderProdutos();
            } else window.location.href = "index.html";
        });

        window.setTab = (tab) => {
            document.getElementById('view-loja').style.display = tab === 'loja' ? 'block' : 'none';
            document.getElementById('view-produtos').style.display = tab === 'produtos' ? 'block' : 'none';
            document.getElementById('t-loja').className = tab === 'loja' ? 'active' : '';
            document.getElementById('t-produtos').className = tab === 'produtos' ? 'active' : '';
        };

        window.addProduto = async () => {
            const p = { nome: document.getElementById('p-nome').value, preco: document.getElementById('p-preco').value, img: document.getElementById('p-img').value };
            data.produtos.push(p);
            await updateDoc(doc(db, "lojas", userUid), { produtos: data.produtos });
            renderProdutos();
        };

        function renderProdutos() {
            const list = document.getElementById('lista-produtos');
            list.innerHTML = data.produtos.map(p => `<div style="background:#1a1a1a; padding:10px; border-radius:8px; margin-bottom:5px;">${p.nome} - R$ ${p.preco}</div>`).join('');
        }
        
        window.logout = () => signOut(auth);
    </script>
</body>
</html>
