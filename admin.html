<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - EatsMenu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { --primary: #00e676; --bg: #050505; --surface: #121212; --border: #333; --text: #fff; }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        
        .dash-header { background: var(--surface); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .dash-container { max-width: 900px; margin: 0 auto; padding: 30px 20px; width: 100%; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #aaa; font-size: 0.9rem; font-weight: 600; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; background: #080808; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary); }
        
        .size-hint { color: #555; font-size: 0.8rem; margin-top: 5px; display: block; }

        .days-wrapper { display: flex; gap: 10px; flex-wrap: wrap; background: #080808; padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .day-option { display: flex; align-items: center; gap: 8px; cursor: pointer; color: #fff; font-weight: 600; background: #222; padding: 8px 15px; border-radius: 20px; border: 1px solid #333; transition: 0.2s; }
        .day-option:has(input:checked) { background: rgba(0, 230, 118, 0.2); border-color: var(--primary); color: var(--primary); }
        .day-option input { display: none; } 

        .btn { background: var(--primary); color: #000; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid #555; color: #ccc; }
        .btn-outline.active { border-color: var(--primary); color: var(--primary); background: rgba(0,230,118,0.1); }
        .btn-danger { background: #ff1744; color: white; width: auto; padding: 5px 15px; font-size: 0.8rem; }
        
        .btn-download { background: #222; border: 1px solid var(--primary); color: var(--primary); padding: 8px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; transition: 0.3s; }
        .btn-download:hover { background: var(--primary); color: #000; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; }
        .tabs button { flex: 1; white-space: nowrap; }

        .item-list { background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .item-list:hover { border-color: #555; }
        
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.1rem; transition: 0.2s; padding: 5px; }
        .btn-icon:hover { transform: scale(1.1); }

        /* Estilos do Upload de Imagem */
        .upload-box { display: flex; align-items: center; gap: 15px; background: #080808; padding: 15px; border-radius: 10px; border: 1px dashed #555; }
        .upload-box img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; display: none; border: 1px solid #333; }
        .btn-upload { background: #222; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: 0.2s; }
        .btn-upload:hover { border-color: var(--primary); color: var(--primary); }
        
        /* Box de Adicionais */
        .adds-box { background: #080808; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .adds-list { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        .add-item { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 8px 12px; border-radius: 6px; border: 1px solid #222; }

        #loading { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loading"><h3>Carregando Painel...</h3></div>

    <div class="dash-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <h3 style="color:var(--primary)">EatsMenu <span style="color:#fff; font-size:0.8em">Admin</span></h3>
            <a href="https://www.mediafire.com/file/l8kbvlnfcnkra95/EatsMenu+Setup+1.0.0.exe/file" target="_blank" class="btn-download">
                <i class="fas fa-download"></i> Baixar Robô
            </a>
        </div>
        <button class="btn btn-danger" onclick="logout()">Sair</button>
    </div>

    <div class="dash-container">
        <div style="background:#1a1a1a; padding:20px; border-radius:15px; margin-bottom:30px; text-align:center; border:1px dashed var(--primary);">
            <p style="color:#aaa; margin-bottom:10px;">SEU CARDÁPIO ONLINE:</p>
            <a id="link-loja" href="#" target="_blank" style="color:var(--primary); font-weight:800; font-size:1.2rem; text-decoration:none;">...</a>
        </div>

        <div class="tabs">
            <button class="btn active" onclick="setTab('loja')" id="tab-btn-loja">🏪 Loja</button>
            <button class="btn btn-outline" onclick="setTab('produtos')" id="tab-btn-produtos">🍔 Cardápio</button>
            <button class="btn btn-outline" onclick="setTab('entregas')" id="tab-btn-entregas">🛵 Entregas</button>
        </div>

        <div id="view-loja">
            <div class="input-group"><label>Nome da Loja</label><input type="text" id="conf-nome"></div>
            <div class="input-group"><label>Link (Slug)</label><input type="text" id="conf-slug" onkeyup="limparSlug(this)"></div>
            <div class="input-group"><label>WhatsApp (Ex: 55279...)</label><input type="text" id="conf-zap"></div>
            
            <div style="background: rgba(0,230,118,0.05); padding: 15px; border-radius: 10px; border: 1px dashed var(--primary); margin-bottom: 20px;">
                <h4 style="color:var(--primary); margin-bottom: 10px;">Pagamento PIX</h4>
                <div class="input-group"><label>Chave Pix</label><input type="text" id="conf-pix-key"></div>
                <div class="input-group"><label>Nome do Beneficiário</label><input type="text" id="conf-pix-name"></div>
            </div>

            <div class="input-group">
                <label>Logo (URL)</label>
                <input type="text" id="conf-logo" placeholder="https://...">
                <span class="size-hint">Recomendado: 500x500 pixels (Quadrado)</span>
            </div>
            
            <div class="input-group">
                <label>Banner (URL)</label>
                <input type="text" id="conf-banner" placeholder="https://...">
                <span class="size-hint">Recomendado: 1000x300 pixels (Retangular)</span>
            </div>
            
            <div class="input-group">
                <label>Cor Principal</label>
                <div style="display:flex; align-items:center; gap:10px; background:#080808; padding:10px; border-radius:10px; border:1px solid #333;">
                    <input type="color" id="conf-cor" style="width:50px; height:40px; border:none; background:none; cursor:pointer;">
                </div>
            </div>
            
            <button class="btn" onclick="salvarLoja()">Salvar Dados</button>
        </div>

        <div id="view-produtos" style="display:none;">
            
            <div style="background:var(--surface); padding:20px; border-radius:15px; margin-bottom:30px; border:1px solid #333;">
                <h4 id="titulo-form-produto" style="margin-bottom:15px; color:var(--primary)"><i class="fas fa-plus-circle"></i> Novo Produto</h4>
                
                <div class="input-group">
                    <label>Imagem do Produto</label>
                    <div class="upload-box">
                        <img id="prod-img-preview" src="">
                        <input type="file" id="prod-img-file" accept="image/png, image/jpeg, image/jpg" hidden onchange="previewImg(event)">
                        <button class="btn-upload" onclick="document.getElementById('prod-img-file').click()"><i class="fas fa-camera"></i> Escolher Foto</button>
                        <span id="prod-img-nome" style="color:#777; font-size:0.8rem;">Nenhuma foto selecionada</span>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px;">
                    <div class="input-group"><label>Nome do Item</label><input type="text" id="prod-nome" placeholder="Ex: X-Bacon"></div>
                    <div class="input-group"><label>Preço (R$)</label><input type="number" id="prod-preco" placeholder="0.00" step="0.01"></div>
                </div>
                
                <div class="input-group">
                    <label>Categoria</label>
                    <input type="text" id="prod-cat" placeholder="Ex: Lanches, Bebidas..." list="list-cats">
                    <datalist id="list-cats"><option value="Lanches"><option value="Bebidas"><option value="Porções"></datalist>
                </div>
                
                <div class="input-group"><label>Descrição / Ingredientes</label><textarea id="prod-desc" placeholder="Descreva os ingredientes..." rows="2"></textarea></div>

                <div class="adds-box">
                    <label><i class="fas fa-plus"></i> Adicionais (Opcional)</label>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <input type="text" id="add-nome" placeholder="Ex: Bacon Extra" style="flex:2; padding:8px;">
                        <input type="number" id="add-preco" placeholder="Valor" style="flex:1; padding:8px;" step="0.01">
                        <button class="btn-upload" style="border-color:var(--primary); color:var(--primary);" onclick="adicionarAdicional()">+</button>
                    </div>
                    <div id="lista-adicionais-form" class="adds-list">
                        </div>
                </div>

                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn btn-outline" id="btn-cancelar-edicao" style="display:none; width:auto;" onclick="cancelarEdicao()">Cancelar</button>
                    <button class="btn" id="btn-salvar-produto" onclick="salvarProduto()">Cadastrar Produto</button>
                </div>
            </div>

            <div>
                <h3 style="margin-bottom:15px; color:#fff;">Seu Cardápio</h3>
                <div id="lista-produtos">
                    </div>
            </div>
        </div>

        <div id="view-entregas" style="display:none;">
            <div style="background:var(--surface); padding:20px; border-radius:15px; margin-bottom:20px; border:1px solid #333;">
                <h4 style="margin-bottom:15px; color:var(--primary)">🕒 Horário de Funcionamento</h4>
                
                <label style="color:#aaa; font-size:0.9rem; margin-bottom:10px; display:block;">Marque os dias que a loja abre:</label>
                <div class="days-wrapper" id="days-container">
                    <label class="day-option"><input type="checkbox" value="0"> Dom</label>
                    <label class="day-option"><input type="checkbox" value="1"> Seg</label>
                    <label class="day-option"><input type="checkbox" value="2"> Ter</label>
                    <label class="day-option"><input type="checkbox" value="3"> Qua</label>
                    <label class="day-option"><input type="checkbox" value="4"> Qui</label>
                    <label class="day-option"><input type="checkbox" value="5"> Sex</label>
                    <label class="day-option"><input type="checkbox" value="6"> Sáb</label>
                </div>

                <div style="display:flex; gap:10px; margin-top:20px;">
                    <div style="flex:1"><label>Abertura (HH:MM)</label><input type="time" id="loja-abre"></div>
                    <div style="flex:1"><label>Fechamento (HH:MM)</label><input type="time" id="loja-fecha"></div>
                </div>
                <button class="btn" onclick="salvarHorario()" style="margin-top:10px;">Salvar Configurações</button>
            </div>

            <div style="background:var(--surface); padding:20px; border-radius:15px; margin-bottom:20px; border:1px solid #333;">
                <h4 style="margin-bottom:15px; color:var(--primary)">🛵 Taxas de Entrega</h4>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="bairro-nome" placeholder="Nome do Bairro" style="flex:2;">
                    <input type="number" id="bairro-taxa" placeholder="Valor R$" style="flex:1;">
                </div>
                <button class="btn" onclick="addBairro()" style="margin-top:10px;">Adicionar Bairro</button>
            </div>
            <div id="lista-bairros"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module">
        // Importações do Firebase v9
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";
        
        // CONFIGURAÇÃO FIREBASE (Igual ao seu firebaseConfig.txt)
        const firebaseConfig = {
            apiKey: "AIzaSyBIvmoayNis2C2xLFQtpRzzrc4dWxGvotU",
            authDomain: "eatsmenu-62cfa.firebaseapp.com",
            projectId: "eatsmenu-62cfa",
            storageBucket: "eatsmenu-62cfa.firebasestorage.app",
            messagingSenderId: "896131512194",
            appId: "1:896131512194:web:51891cf2bd5a04c6c7819b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        // ESTADOS GLOBAIS
        let userUid = null;
        let data = { produtos: [], bairros: [], dias_func: [] };
        
        // ESTADOS DO CARDÁPIO
        let editIndex = -1; // -1 significa "Novo Produto". Número maior que -1 é a posição do item sendo editado.
        let arrayAdicionaisTemp = []; // Lista temporária de adicionais no formulário
        let urlImagemAtual = ""; // Guarda o link da imagem atual caso não suba uma nova

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userUid = user.uid;
                await checkPaymentStatus();
                await loadData();
                document.getElementById('loading').style.display = 'none';
            } else {
                window.location.href = 'index.html';
            }
        });

        async function checkPaymentStatus() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('collection_status') === 'approved') {
                await updateDoc(doc(db, "lojas", userUid), { 
                    status_pagamento: 'ativo', data_ativacao: new Date()
                });
                toast("✅ Pagamento confirmado! Painel Liberado.");
                window.history.replaceState({}, document.title, "admin.html");
            }
        }

        async function loadData() {
            const snap = await getDoc(doc(db, "lojas", userUid));
            if (snap.exists()) {
                data = snap.data();
                if(data.status_pagamento === 'pendente') {
                    alert("Aguardando confirmação do pagamento.");
                    window.location.href = "index.html"; return;
                }
                if(!data.produtos) data.produtos = [];
                if(!data.bairros) data.bairros = [];
                if(!data.dias_func) data.dias_func = [0,1,2,3,4,5,6];
                
                // Popula aba Loja
                const campos = ['conf-nome','conf-slug','conf-zap','conf-pix-key','conf-pix-name','conf-logo','conf-banner','conf-cor'];
                campos.forEach(id => {
                    const key = id.replace('conf-','').replace(/-/g,'_');
                    if(document.getElementById(id)) document.getElementById(id).value = data[key] || "";
                });
                
                // Popula aba Entregas
                document.getElementById('loja-abre').value = data.hora_abre || "18:00";
                document.getElementById('loja-fecha').value = data.hora_fecha || "23:00";
                document.querySelectorAll('#days-container input').forEach(chk => {
                    chk.checked = data.dias_func.includes(parseInt(chk.value));
                });

                updateLink(data.slug);
                renderProdutos();
                renderBairros();
            }
        }

        // ==========================================
        // LÓGICA DO CARDÁPIO (PRODUTOS)
        // ==========================================

        // Preview da imagem escolhida
        window.previewImg = (event) => {
            const file = event.target.files[0];
            if(file) {
                document.getElementById('prod-img-nome').innerText = file.name;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('prod-img-preview').src = e.target.result;
                    document.getElementById('prod-img-preview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        // Adicionar adicionais temporários
        window.adicionarAdicional = () => {
            const nome = document.getElementById('add-nome').value;
            const preco = parseFloat(document.getElementById('add-preco').value);
            
            if(!nome || isNaN(preco)) return toast("Preencha nome e preço do adicional", "error");
            
            arrayAdicionaisTemp.push({ nome: nome, preco: preco });
            document.getElementById('add-nome').value = '';
            document.getElementById('add-preco').value = '';
            renderAdicionaisTemp();
        };

        window.removerAdicional = (idx) => {
            arrayAdicionaisTemp.splice(idx, 1);
            renderAdicionaisTemp();
        };

        function renderAdicionaisTemp() {
            const div = document.getElementById('lista-adicionais-form');
            div.innerHTML = '';
            arrayAdicionaisTemp.forEach((add, idx) => {
                div.innerHTML += `
                    <div class="add-item">
                        <span>${add.nome} <strong style="color:var(--primary)">+R$ ${add.preco.toFixed(2)}</strong></span>
                        <button class="btn-icon" style="color:var(--danger);" onclick="removerAdicional(${idx})"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });
        }

        // SALVAR (Criar novo ou Editar existente)
        window.salvarProduto = async () => {
            const nome = document.getElementById('prod-nome').value;
            const preco = parseFloat(document.getElementById('prod-preco').value);
            const cat = document.getElementById('prod-cat').value;
            const desc = document.getElementById('prod-desc').value;
            const fileInput = document.getElementById('prod-img-file');
            
            if(!nome || isNaN(preco) || !cat) return toast("Preencha o Nome, Preço e Categoria", "error");

            const btn = document.getElementById('btn-salvar-produto');
            const textoOriginal = btn.innerText;
            btn.innerText = "Salvando...";
            btn.disabled = true;

            try {
                let finalImgUrl = urlImagemAtual;

                // Se selecionou foto nova, sobe pro Storage
                if(fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const storageRef = ref(storage, `lojas/${userUid}/produtos/${Date.now()}_${file.name}`);
                    const snap = await uploadBytes(storageRef, file);
                    finalImgUrl = await getDownloadURL(snap.ref);
                }

                const prod = {
                    nome: nome,
                    preco: preco,
                    cat: cat,
                    desc: desc,
                    img: finalImgUrl,
                    adds: [...arrayAdicionaisTemp] // Clona a lista de adicionais
                };

                if(editIndex > -1) {
                    // Atualiza item existente
                    data.produtos[editIndex] = prod;
                    toast("Produto Atualizado!");
                } else {
                    // Cria item novo
                    data.produtos.push(prod);
                    toast("Produto Adicionado!");
                }

                await updateDoc(doc(db, "lojas", userUid), { produtos: data.produtos });
                
                cancelarEdicao(); // Limpa form
                renderProdutos(); // Atualiza lista
                
            } catch(e) {
                console.error(e);
                toast("Erro ao salvar produto", "error");
            } finally {
                btn.innerText = textoOriginal;
                btn.disabled = false;
            }
        };

        // Carrega os dados pro formulário
        window.editarProduto = (idx) => {
            const p = data.produtos[idx];
            editIndex = idx;
            
            document.getElementById('titulo-form-produto').innerHTML = '<i class="fas fa-pen"></i> Editar Produto';
            document.getElementById('prod-nome').value = p.nome || '';
            document.getElementById('prod-preco').value = p.preco || '';
            document.getElementById('prod-cat').value = p.cat || '';
            document.getElementById('prod-desc').value = p.desc || '';
            
            urlImagemAtual = p.img || '';
            if(urlImagemAtual) {
                document.getElementById('prod-img-preview').src = urlImagemAtual;
                document.getElementById('prod-img-preview').style.display = 'block';
                document.getElementById('prod-img-nome').innerText = "Imagem salva mantida";
            } else {
                document.getElementById('prod-img-preview').style.display = 'none';
                document.getElementById('prod-img-nome').innerText = "Nenhuma foto selecionada";
            }

            // Tratamento caso os adicionais antigos estivessem em texto
            if(typeof p.adds === 'string') { arrayAdicionaisTemp = []; } 
            else { arrayAdicionaisTemp = p.adds ? [...p.adds] : []; }
            renderAdicionaisTemp();

            document.getElementById('btn-salvar-produto').innerText = "Salvar Alterações";
            document.getElementById('btn-cancelar-edicao').style.display = 'block';
            
            // Rola a tela para o formulário
            document.getElementById('view-produtos').scrollIntoView({ behavior: 'smooth' });
        };

        window.cancelarEdicao = () => {
            editIndex = -1;
            urlImagemAtual = "";
            arrayAdicionaisTemp = [];
            
            document.getElementById('titulo-form-produto').innerHTML = '<i class="fas fa-plus-circle"></i> Novo Produto';
            document.getElementById('prod-nome').value = "";
            document.getElementById('prod-preco').value = "";
            document.getElementById('prod-cat').value = "";
            document.getElementById('prod-desc').value = "";
            document.getElementById('prod-img-file').value = "";
            document.getElementById('prod-img-preview').style.display = 'none';
            document.getElementById('prod-img-nome').innerText = "Nenhuma foto selecionada";
            
            document.getElementById('btn-salvar-produto').innerText = "Cadastrar Produto";
            document.getElementById('btn-cancelar-edicao').style.display = 'none';
            renderAdicionaisTemp();
        };

        function renderProdutos() {
            const div = document.getElementById('lista-produtos');
            div.innerHTML = "";
            
            if(data.produtos.length === 0) {
                div.innerHTML = "<p style='color:#777; text-align:center; margin-top:20px;'>Nenhum produto cadastrado.</p>";
                return;
            }

            // Agrupa por Categoria
            const categorias = {};
            data.produtos.forEach((p, idx) => {
                const catName = p.cat || "Sem Categoria";
                if(!categorias[catName]) categorias[catName] = [];
                categorias[catName].push({ ...p, indexReal: idx }); // Salva o index original pra edição/exclusão não bugar
            });

            // Renderiza cada categoria
            for(let cat in categorias) {
                div.innerHTML += `<h3 style="color:var(--primary); margin: 25px 0 10px 0; border-bottom:1px solid #333; padding-bottom:5px;">${cat}</h3>`;
                
                categorias[cat].forEach(p => {
                    const imgSrc = p.img || 'https://via.placeholder.com/60x60/1a1a1a/333333?text=Sem+Foto';
                    div.innerHTML += `
                        <div class="item-list">
                            <div style="display:flex; align-items:center; gap:15px;">
                                <img src="${imgSrc}" style="width:60px; height:60px; object-fit:cover; border-radius:8px; border:1px solid #333;">
                                <div>
                                    <strong style="font-size:1.1rem; color:#fff;">${p.nome}</strong><br>
                                    <small style="color:var(--primary); font-weight:bold; font-size:1rem;">R$ ${p.preco.toFixed(2)}</small>
                                </div>
                            </div>
                            <div style="display:flex; gap:10px;">
                                <button class="btn-icon" style="color:#fff;" title="Editar" onclick="editarProduto(${p.indexReal})"><i class="fas fa-pen"></i></button>
                                <button class="btn-icon" style="color:var(--danger);" title="Excluir" onclick="delItem('produtos', ${p.indexReal})"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        // ==========================================
        // OUTRAS FUNÇÕES GERAIS (LOJA E ENTREGAS)
        // ==========================================
        window.salvarLoja = async () => {
            const update = {
                nome: document.getElementById('conf-nome').value,
                slug: document.getElementById('conf-slug').value,
                whatsapp: document.getElementById('conf-zap').value,
                pix_key: document.getElementById('conf-pix-key').value,
                pix_name: document.getElementById('conf-pix-name').value,
                logo: document.getElementById('conf-logo').value,
                banner: document.getElementById('conf-banner').value,
                cor: document.getElementById('conf-cor').value
            };
            await updateDoc(doc(db, "lojas", userUid), update);
            updateLink(update.slug);
            toast("Dados Salvos!");
        };

        window.salvarHorario = async () => {
            const diasSelecionados = [];
            document.querySelectorAll('#days-container input:checked').forEach(chk => {
                diasSelecionados.push(parseInt(chk.value));
            });
            await updateDoc(doc(db, "lojas", userUid), {
                hora_abre: document.getElementById('loja-abre').value,
                hora_fecha: document.getElementById('loja-fecha').value,
                dias_func: diasSelecionados
            });
            toast("Horário Atualizado!");
        };

        window.addBairro = async () => {
            const nome = document.getElementById('bairro-nome').value;
            const taxa = parseFloat(document.getElementById('bairro-taxa').value);
            if(!nome) return toast("Preencha o nome", "error");
            data.bairros.push({ nome, taxa: taxa || 0 });
            await updateDoc(doc(db, "lojas", userUid), { bairros: data.bairros });
            document.getElementById('bairro-nome').value = "";
            renderBairros();
            toast("Bairro Adicionado!");
        };

        function renderBairros() {
            const div = document.getElementById('lista-bairros');
            div.innerHTML = "";
            data.bairros.forEach((b, idx) => {
                div.innerHTML += `
                    <div class="item-list">
                        <div><strong style="color:#fff;">${b.nome}</strong><br><small style="color:var(--primary); font-weight:bold;">Taxa: R$ ${b.taxa.toFixed(2)}</small></div>
                        <button class="btn-icon" style="color:var(--danger);" onclick="delItem('bairros', ${idx})"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
        }

        window.delItem = async (tipo, idx) => {
            if(confirm("Tem certeza que deseja excluir?")) {
                data[tipo].splice(idx, 1);
                await updateDoc(doc(db, "lojas", userUid), { [tipo]: data[tipo] });
                tipo === 'produtos' ? renderProdutos() : renderBairros();
                
                // Se o cara excluiu o item que ele estava editando, limpa o formulário
                if(tipo === 'produtos' && editIndex === idx) {
                    cancelarEdicao();
                }
            }
        };

        function updateLink(slug) {
            const url = `https://${slug}.eatsmenu.com.br`;
            document.getElementById('link-loja').href = url;
            document.getElementById('link-loja').innerText = url;
        }
        
        window.setTab = (tab) => {
            ['loja', 'produtos', 'entregas'].forEach(t => {
                document.getElementById('view-'+t).style.display = t === tab ? 'block' : 'none';
                document.getElementById('tab-btn-'+t).className = t === tab ? 'btn active' : 'btn btn-outline';
            });
            if(tab !== 'produtos') cancelarEdicao(); // Limpa o formulário se sair da aba
        }
        
        window.limparSlug = (el) => el.value = el.value.toLowerCase().replace(/[^a-z0-9-]/g, '');
        window.logout = () => signOut(auth).then(() => window.location.href = "index.html");
        function toast(msg, type="success") { Toastify({ text: msg, style: { background: type==="success"?"#00e676":"#ff1744", color: "#000", fontWeight: "bold" } }).showToast(); }
    </script>
</body>
</html>
